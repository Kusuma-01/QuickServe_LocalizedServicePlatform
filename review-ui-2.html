<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave a Review</title>
    <!-- Include Supabase JS from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #f7f9fa;
            /* Light gray background */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            color: #1a202c;
        }

        .container {
            width: 100%;
            max-width: 650px;
        }

        .main-title {
            font-size: 22px;
            font-weight: bold;
            color: #001f3f;
            /* Dark blue/black */
            margin-bottom: 24px;
        }

        .card {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 32px;
            border: 1px solid #e2e8f0;
        }

        .card-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 24px;
            color: #001f3f;
        }

        .rating-box {
            background-color: #f8fafc;
            /* Very light gray */
            padding: 24px;
            text-align: center;
            margin-bottom: 32px;
        }

        .rating-label {
            font-size: 14px;
            color: #4a5568;
            margin-bottom: 12px;
        }

        .stars {
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .stars svg {
            width: 28px;
            height: 28px;
            fill: #fbbf24;
            /* yellow/gold */
            cursor: pointer;
            transition: transform 0.1s;
        }

        .stars svg:hover {
            transform: scale(1.1);
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            color: #2d3748;
            margin-bottom: 12px;
        }

        .textarea-wrapper {
            position: relative;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 16px;
            border: 1px solid #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            background-color: #ffffff;
            font-size: 15px;
            color: #4a5568;
            resize: vertical;
            box-sizing: border-box;
            outline: none;
            font-family: inherit;
        }

        textarea::placeholder {
            color: #a0aec0;
        }

        textarea:focus {
            border: 1px solid #93c5fd;
            border-radius: 4px;
        }

        .char-count {
            position: absolute;
            bottom: -24px;
            right: 0px;
            font-size: 12px;
            color: #a0aec0;
            pointer-events: none;
        }

        .submit-btn {
            width: 100%;
            background-color: #8dbbf2;
            /* Light blue per the image */
            color: white;
            font-weight: bold;
            font-size: 16px;
            padding: 16px;
            border: none;
            cursor: pointer;
            margin-top: 16px;
            transition: background-color 0.2s;
        }

        .submit-btn:hover {
            background-color: #7aa5dd;
        }

        .submit-btn:disabled {
            background-color: #cbd5e1;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1 class="main-title">Leave a Review</h1>

        <div class="card">
            <h2 class="card-title">Rate this Service</h2>

            <div class="rating-box">
                <div class="rating-label">Overall Rating</div>
                <div class="stars" id="star-container">
                    <!-- 5 Stars -->
                    <svg data-rating="1" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 17.27L18.18 21.36L16.54 13.97L22 9.24L14.81 8.63L12 2L9.19 8.63L2 9.24L7.46 13.97L5.82 21.36L12 17.27Z" />
                    </svg>
                    <svg data-rating="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 17.27L18.18 21.36L16.54 13.97L22 9.24L14.81 8.63L12 2L9.19 8.63L2 9.24L7.46 13.97L5.82 21.36L12 17.27Z" />
                    </svg>
                    <svg data-rating="3" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 17.27L18.18 21.36L16.54 13.97L22 9.24L14.81 8.63L12 2L9.19 8.63L2 9.24L7.46 13.97L5.82 21.36L12 17.27Z" />
                    </svg>
                    <svg data-rating="4" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 17.27L18.18 21.36L16.54 13.97L22 9.24L14.81 8.63L12 2L9.19 8.63L2 9.24L7.46 13.97L5.82 21.36L12 17.27Z" />
                    </svg>
                    <svg data-rating="5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 17.27L18.18 21.36L16.54 13.97L22 9.24L14.81 8.63L12 2L9.19 8.63L2 9.24L7.46 13.97L5.82 21.36L12 17.27Z" />
                    </svg>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Share details of your experience</label>
                <div class="textarea-wrapper">
                    <textarea id="review-text" placeholder="What did you like or dislike? How was the service quality?"
                        maxlength="500"></textarea>
                    <div class="char-count" id="char-count">500 characters left</div>
                </div>
            </div>

            <button class="submit-btn" id="submit-btn" onclick="submitReview()">Submit Review</button>
        </div>
    </div>

    <script>
        // --- UI Logic ---
        let currentRating = 5; // Default rating
        const stars = document.querySelectorAll('.stars svg');
        const textarea = document.getElementById('review-text');
        const charCount = document.getElementById('char-count');

        // Star Click Logic
        stars.forEach(star => {
            star.addEventListener('click', (e) => {
                currentRating = parseInt(e.currentTarget.getAttribute('data-rating'));
                updateStars();
            });
        });

        function updateStars() {
            stars.forEach(star => {
                const rating = parseInt(star.getAttribute('data-rating'));
                if (rating <= currentRating) {
                    star.style.fill = '#fbbf24'; // Yellow
                } else {
                    star.style.fill = '#e2e8f0'; // Gray empty star effect
                }
            });
        }

        // Character Count Logic
        textarea.addEventListener('input', () => {
            const remaining = 500 - textarea.value.length;
            charCount.innerText = `${remaining} characters left`;
        });


        // --- Supabase Backend Logic ---
        // 1. You MUST replace these with your actual Supabase URL and Anon Key!
        const SUPABASE_URL = 'https://ydgsqtcqhorinfvvxrab.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_ZVHwyBVoCI4zyEA5SAJ14w_R1dao7-4';

        let supabaseClient = null;
        if (SUPABASE_URL !== 'YOUR_SUPABASE_URL_HERE') {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }

        async function submitReview() {
            if (!supabaseClient) {
                alert("Please edit the HTML file and set YOUR_SUPABASE_URL_HERE and YOUR_SUPABASE_ANON_KEY_HERE to save data to the backend.");
                return;
            }

            const btn = document.getElementById('submit-btn');
            const reviewText = textarea.value;

            btn.disabled = true;
            btn.innerText = "Submitting...";

            try {
                // 2. This assumes you created a table named 'reviews' in Supabase 
                // with columns: 'rating' (int) and 'comment' (text)
                const { data, error } = await supabaseClient
                    .from('reviews')
                    .insert([
                        { rating: currentRating, comment: reviewText }
                    ]);

                if (error) throw error;

                alert("Review saved to Supabase backend successfully!");
                textarea.value = ''; // clear form
                charCount.innerText = '500 characters left';

            } catch (error) {
                console.error('Error submitting review:', error.message);
                alert("Error: " + error.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Submit Review";
            }
        }
    </script>
</body>

</html>
